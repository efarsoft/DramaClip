[app]
    project_version="0.1.0"

    # LLM API 超时配置（秒）
    llm_vision_timeout = 120
    llm_text_timeout = 180
    llm_max_retries = 3

    ##########################################
    # 🚀 LLM 配置 - OpenAI 兼容统一接口
    ##########################################

    # ===== 视觉模型配置 =====
    vision_llm_provider = "openai"
    vision_openai_model_name = "Qwen/Qwen2.5-VL-32B-Instruct"
    vision_openai_api_key = ""
    vision_openai_base_url = "https://api.siliconflow.cn/v1"

    # ===== 文本模型配置 =====
    text_llm_provider = "openai"
    text_openai_model_name = "deepseek-ai/DeepSeek-V3"
    text_openai_api_key = ""
    text_openai_base_url = "https://api.siliconflow.cn/v1"

    # WebUI 界面是否显示配置项
    hide_config = true

##########################################
# TTS (文本转语音) 配置 - AI解说模式使用
##########################################

[azure]
    speech_key = ""
    speech_region = ""

[tencent]
    secret_id = ""
    secret_key = ""
    region = "ap-beijing"

[cosyvoice]
    # CosyVoice TTS (DashScope API) - AI解说模式使用
    # 支持 v3-flash/v3-plus/v2/v1，仅 v3 系列支持情感 Instruct
    api_key = ""
    model = "cosyvoice-v3-flash"
    voice = "longanyang"
    # 情感指令 (仅 v3 + 支持 Instruct 的音色可用，留空则无情感控制)
    # 示例: "用激动的语气说", "带有悲伤的情感", "用温柔亲切的语气"
    instruction = ""

[ui]
    # TTS引擎选择 (edge_tts, azure_speech, tencent_tts)
    tts_engine = "edge_tts"
    edge_voice_name = "zh-CN-XiaoyiNeural-Female"
    edge_volume = 80
    edge_rate = 1.0
    edge_pitch = 0
    azure_voice_name = "zh-CN-XiaoyiNeural-Female"
    azure_volume = 80
    azure_rate = 1.0
    azure_pitch = 0

##########################################
# 代理和网络配置
##########################################

[proxy]
    http = ""
    https = ""
    enabled = false

##########################################
# 🎬 DramaClip 高光剪辑核心配置
##########################################

[highlight]
    # 高光打分权重配置
    audio_weight = 0.4       # 音频爆点权重
    emotion_weight = 0.3     # 台词情绪权重
    visual_weight = 0.2      # 画面特征权重
    rhythm_weight = 0.1      # 镜头节奏权重
    
    # 筛选配置
    top_ratio = 0.3          # 选取Top N比例 (0.3 = Top30%)
    min_segment_duration = 2 # 最小片段时长(秒)
    max_segments_per_episode = 5  # 每集最多保留片段数
    min_episodes_covered = 1  # 最少覆盖集数

[output]
    # 默认输出配置
    default_duration = 30    # 默认输出时长(秒)，可选: 15, 30, 45, 60
    resolution = "1080P"      # 输出分辨率
    aspect_ratio = "9:16"     # 宽高比 (竖屏)
    fps = 25                  # 帧率

[scene_detect]
    # PySceneDetect 镜头分割配置
    threshold = 30           # 场景检测阈值
    min_scene_len = 2        # 最小场景长度(秒)
    max_scene_len = 8        # 最大场景长度(秒)

[frames]
    frame_interval_input = 3
    vision_batch_size = 10
